<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veil — Governance</title>
  <style>/* ============ Veil — private governance · design tokens ============ */
:root {
  --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Helvetica Neue", Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;

  /* neutrals — cool-tinted, low saturation */
  --bg:        oklch(0.985 0.002 255);
  --bg-sunk:   oklch(0.965 0.003 255);
  --card:      #ffffff;
  --line:      oklch(0.918 0.004 255);
  --line-soft: oklch(0.952 0.003 255);
  --ink:       oklch(0.235 0.012 262);
  --ink-2:     oklch(0.50 0.012 262);
  --ink-3:     oklch(0.62 0.010 262);

  /* accent — blue */
  --accent:      oklch(0.55 0.18 255);
  --accent-press:oklch(0.48 0.18 255);
  --accent-tint: oklch(0.965 0.028 255);
  --accent-line: oklch(0.90 0.05 255);
  --accent-ink:  oklch(0.45 0.16 255);

  /* result semantics */
  --for:     oklch(0.60 0.13 162);
  --for-tint:oklch(0.965 0.03 162);
  --against: oklch(0.585 0.16 22);
  --against-tint:oklch(0.965 0.03 22);

  --r-card: 16px;
  --r-md: 11px;
  --r-sm: 8px;
  --shadow-sm: 0 1px 2px oklch(0.4 0.02 262 / 0.05);
  --shadow-md: 0 4px 16px oklch(0.4 0.02 262 / 0.06), 0 1px 3px oklch(0.4 0.02 262 / 0.05);
  --maxw: 1200px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  font-size: 15px;
  line-height: 1.5;
}
.mono { font-family: var(--font-mono); font-feature-settings: "tnum" 1; }
button { font-family: inherit; cursor: pointer; }
::selection { background: var(--accent-tint); }

/* ============ top bar ============ */
.topbar {
  position: sticky; top: 0; z-index: 50;
  height: 58px;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: oklch(0.99 0.002 255 / 0.82);
  backdrop-filter: saturate(1.4) blur(12px);
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 640; letter-spacing: -0.01em; font-size: 16px; }
.brand-mark {
  width: 22px; height: 22px; border-radius: 6px;
  background: linear-gradient(150deg, var(--accent), oklch(0.5 0.17 280));
  position: relative; flex: none;
}
.brand-mark::after {
  content: ""; position: absolute; inset: 6px;
  border-radius: 50%;
  background: #fff; opacity: 0.92;
  clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
}
.brand small { color: var(--ink-3); font-weight: 480; font-size: 12.5px; margin-left: 2px; }
.topbar-right { display: flex; align-items: center; gap: 14px; }

/* demo state switch */
.state-switch { display: flex; align-items: center; gap: 0; background: var(--bg-sunk); border: 1px solid var(--line); border-radius: 9px; padding: 3px; }
.state-switch span { font-size: 11px; color: var(--ink-3); padding: 0 8px 0 6px; font-weight: 560; letter-spacing: 0.02em; text-transform: uppercase; }
.state-switch button {
  border: none; background: transparent; color: var(--ink-2);
  font-size: 12.5px; font-weight: 560; padding: 5px 11px; border-radius: 6px; transition: 0.12s;
}
.state-switch button.on { background: var(--card); color: var(--ink); box-shadow: var(--shadow-sm); }
.topbar-avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--line); }
.account { position: relative; }
.account-trigger {
  border: none;
  background: transparent;
  padding: 2px;
  border-radius: 999px;
  display: grid;
  place-items: center;
}
.account-trigger:hover { background: var(--bg-sunk); }
.account-trigger:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.account-trigger.on { box-shadow: 0 0 0 3px var(--accent-tint); }
.account-menu {
  position: absolute;
  right: 0;
  top: calc(100% + 8px);
  width: min(320px, calc(100vw - 24px));
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  box-shadow: var(--shadow-md);
  padding: 10px;
  z-index: 80;
}
.account-head { display: flex; align-items: center; gap: 11px; padding: 4px 4px 10px; }
.account-avatar { width: 36px; height: 36px; font-size: 12px; }
.account-id { min-width: 0; }
.account-name { font-size: 14px; font-weight: 660; color: var(--ink); line-height: 1.25; }
.account-address { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
.account-badges { display: flex; flex-wrap: wrap; gap: 6px; padding: 0 4px 10px; }
.account-badges span {
  font-size: 11.5px;
  font-weight: 600;
  color: var(--accent-ink);
  background: var(--accent-tint);
  border: 1px solid var(--accent-line);
  border-radius: 999px;
  padding: 3px 8px;
}
.account-vp {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  border: 1px solid var(--line-soft);
  background: var(--bg-sunk);
  border-radius: var(--r-sm);
  padding: 10px 11px;
}
.account-vp span { font-size: 12px; color: var(--ink-3); font-weight: 560; }
.account-vp b { font-size: 14px; color: var(--ink); }
.account-privacy {
  display: flex;
  align-items: flex-start;
  gap: 9px;
  margin-top: 8px;
  padding: 10px 11px;
  border-radius: var(--r-sm);
  background: var(--accent-tint);
  color: var(--accent-ink);
  font-size: 12.5px;
  line-height: 1.45;
}
.account-privacy svg { flex: none; margin-top: 1px; color: var(--accent); }
.account-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 6px;
  padding: 10px 0;
}
.account-stats div {
  border: 1px solid var(--line-soft);
  border-radius: var(--r-sm);
  padding: 8px 6px;
  text-align: center;
}
.account-stats b { display: block; font-size: 14px; line-height: 1.1; }
.account-stats span { display: block; font-size: 11px; color: var(--ink-3); margin-top: 3px; }
.account-actions { display: flex; flex-direction: column; gap: 2px; border-top: 1px solid var(--line-soft); padding-top: 6px; }
.account-action {
  display: flex;
  align-items: center;
  gap: 9px;
  width: 100%;
  border: none;
  background: transparent;
  color: var(--ink-2);
  text-decoration: none;
  border-radius: 7px;
  padding: 9px 10px;
  font-size: 13px;
  font-weight: 540;
  text-align: left;
}
.account-action:hover { background: var(--bg-sunk); color: var(--ink); }
.account-action svg { flex: none; color: var(--ink-3); }
.account-action.muted { color: var(--ink-3); }

/* ============ page ============ */
.page { max-width: var(--maxw); margin: 0 auto; padding: 26px 24px 96px; }

.card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--r-card);
  box-shadow: var(--shadow-sm);
}
.card-pad { padding: 22px; }
.card-title { font-size: 13px; font-weight: 640; letter-spacing: 0.01em; color: var(--ink); margin: 0; display: flex; align-items: center; gap: 8px; }
.card-sub { font-size: 13px; color: var(--ink-3); margin: 2px 0 0; }
.divider { height: 1px; background: var(--line-soft); border: 0; margin: 0; }

/* ============ badges ============ */
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: 0.01em;
  padding: 4px 10px 4px 9px; border-radius: 999px;
  border: 1px solid transparent;
}
.badge .dot { width: 6px; height: 6px; border-radius: 50%; }
.badge--active { background: var(--accent-tint); color: var(--accent-ink); border-color: var(--accent-line); }
.badge--active .dot { background: var(--accent); box-shadow: 0 0 0 0 var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%{box-shadow:0 0 0 0 oklch(0.55 0.18 255 / 0.5);} 70%{box-shadow:0 0 0 6px oklch(0.55 0.18 255 / 0);} 100%{box-shadow:0 0 0 0 oklch(0.55 0.18 255 / 0);} }
.badge--passed { background: var(--for-tint); color: oklch(0.45 0.12 162); border-color: oklch(0.9 0.05 162); }
.badge--passed .dot { background: var(--for); }
.badge--failed { background: var(--against-tint); color: oklch(0.47 0.15 22); border-color: oklch(0.9 0.05 22); }
.badge--failed .dot { background: var(--against); }
.badge--ended { background: var(--bg-sunk); color: var(--ink-2); border-color: var(--line); }
.badge--ended .dot { background: var(--ink-3); }

/* ============ overview ============ */
.overview { padding: 24px 26px; margin-bottom: 18px; }
.ov-head { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
.ov-id { font-size: 12.5px; color: var(--ink-3); }
.ov-id b { color: var(--ink-2); font-weight: 560; }
.ov-title { font-size: 27px; line-height: 1.2; font-weight: 680; letter-spacing: -0.018em; margin: 0 0 8px; max-width: 46ch; text-wrap: balance; }
.ov-summary { font-size: 15.5px; color: var(--ink-2); margin: 0 0 18px; max-width: 72ch; line-height: 1.55; text-wrap: pretty; }
.ov-author { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-2); }
.ov-author .avatar { width: 20px; height: 20px; }

/* full proposal body */
.ov-body { margin-top: 24px; border-top: 1px solid var(--line-soft); padding-top: 20px; display: flex; flex-direction: column; gap: 20px; }
.ov-section { }
.ov-sh { font-size: 13px; font-weight: 680; letter-spacing: 0.03em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 8px; }
.ov-para { font-size: 14.5px; color: var(--ink-2); line-height: 1.65; margin: 0 0 8px; white-space: pre-line; max-width: 72ch; text-wrap: pretty; }
.ov-para:last-child { margin-bottom: 0; }

/* full proposal body */
.ov-body { margin-top: 24px; border-top: 1px solid var(--line-soft); padding-top: 20px; display: flex; flex-direction: column; gap: 20px; }
.ov-section { }
.ov-sh { font-size: 13px; font-weight: 680; letter-spacing: 0.03em; text-transform: uppercase; color: var(--ink-3); margin: 0 0 8px; }
.ov-para { font-size: 14.5px; color: var(--ink-2); line-height: 1.65; margin: 0 0 8px; white-space: pre-line; max-width: 72ch; text-wrap: pretty; }
.ov-para:last-child { margin-bottom: 0; }

.ov-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 0; border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; margin-top: 18px; }
.ov-cell { padding: 15px 18px; border-right: 1px solid var(--line-soft); }
.ov-cell:last-child { border-right: 0; }
.ov-cell .lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--ink-3); font-weight: 600; margin-bottom: 9px; }
.ov-cell .big { font-size: 20px; font-weight: 660; letter-spacing: -0.01em; }
.ov-cell .sub { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; }

/* timeline */
.timeline { display: flex; align-items: flex-start; gap: 0; }
.tl-step { flex: 1; position: relative; padding-top: 16px; }
.tl-step::before { content:""; position:absolute; top: 4px; left: 0; width: 9px; height: 9px; border-radius: 50%; background: var(--card); border: 2px solid var(--line); }
.tl-step::after { content:""; position:absolute; top: 8px; left: 9px; right: 0; height: 2px; background: var(--line); }
.tl-step:last-child::after { display: none; }
.tl-step.done::before { background: var(--accent); border-color: var(--accent); }
.tl-step.done::after { background: var(--accent); }
.tl-step.now::before { background: var(--card); border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-tint); }
.tl-step .tl-lbl { font-size: 11px; color: var(--ink-3); font-weight: 560; }
.tl-step .tl-date { font-size: 12.5px; color: var(--ink); font-weight: 560; margin-top: 1px; }

/* quorum bar */
.qbar-wrap { margin-top: 10px; }
.qbar { height: 8px; border-radius: 999px; background: var(--bg-sunk); overflow: hidden; position: relative; }
.qbar-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.6s cubic-bezier(.2,.7,.2,1); }
.qbar-fill.met { background: var(--for); }
.qbar-mark { position: absolute; top: -3px; bottom: -3px; width: 2px; background: var(--ink-2); border-radius: 2px; }
.qbar-legend { display: flex; justify-content: space-between; font-size: 11.5px; color: var(--ink-3); margin-top: 6px; }

/* actions */
.ov-actions { display: flex; gap: 10px; margin-top: 20px; align-items: center; }
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  font-size: 14px; font-weight: 580; padding: 10px 18px; border-radius: var(--r-sm);
  border: 1px solid var(--line); background: var(--card); color: var(--ink); transition: 0.13s;
}
.btn:hover { background: var(--bg-sunk); }
.btn--primary { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 1px 2px oklch(0.5 0.18 255 / 0.3); }
.btn--primary:hover { background: var(--accent-press); }
.btn--lg { padding: 12px 22px; font-size: 14.5px; }
.btn--block { width: 100%; }
.btn:disabled { opacity: 0.5; cursor: default; }
.btn-note { font-size: 12.5px; color: var(--ink-3); }

/* ============ detail page: persistent header + tabs ============ */
.detail-head {
  position: sticky; top: 57px; z-index: 30;
  background: oklch(0.99 0.002 255 / 0.88); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.dh-inner { max-width: var(--maxw); margin: 0 auto; padding: 18px 24px 0; }
.dh-meta { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.dh-id { font-size: 12px; color: var(--ink-3); font-family: var(--font-mono); }
.dh-tag { font-size: 12px; color: var(--ink-3); background: var(--bg-sunk); padding: 3px 9px; border-radius: 999px; }
.dh-title { font-size: 21px; font-weight: 680; letter-spacing: -0.02em; line-height: 1.25; margin: 11px 0 14px; text-wrap: balance; max-width: 60ch; }
.dtabs { display: flex; gap: 2px; }
.dtab {
  border: none; background: transparent; color: var(--ink-2);
  font-size: 14px; font-weight: 550; padding: 11px 15px 13px; border-radius: 0;
  display: inline-flex; align-items: center; gap: 8px;
  border-bottom: 2px solid transparent; margin-bottom: -1px; transition: 0.13s;
}
.dtab svg { color: var(--ink-3); transition: 0.13s; }
.dtab:hover { color: var(--ink); }
.dtab.on { color: var(--accent-ink); border-bottom-color: var(--accent); }
.dtab.on svg { color: var(--accent); }
.detail-page { max-width: var(--maxw); margin: 0 auto; padding: 24px; }
.tab-grid { max-width: 720px; }
.detail-page .col-left { position: static; gap: 18px; }

/* vote tab two-column layout */
.vote-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.vote-col-left { display: flex; flex-direction: column; }
.vote-col-left > .card { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.vote-col-left .voter-tabs { flex-shrink: 0; }
.vote-col-left .voter-list { flex: 1; overflow-y: auto; min-height: 0; scrollbar-width: thin; }
.vote-col-right { display: flex; flex-direction: column; gap: 18px; }
@media (max-width: 700px) { .vote-grid { grid-template-columns: 1fr; } }

/* ============ two-column layout (legacy) ============ */
.grid { display: grid; grid-template-columns: 392px 1fr; gap: 18px; align-items: start; }
.col-left { display: flex; flex-direction: column; gap: 18px; position: sticky; top: 74px; }
.col-right { display: flex; flex-direction: column; gap: 0; min-width: 0; }

/* ============ voting panel ============ */
.vote-head { display:flex; align-items:center; justify-content: space-between; padding: 18px 20px; }
.vote-options { display: flex; flex-direction: column; gap: 9px; padding: 0 20px 4px; }
.vote-opt {
  display: flex; align-items: center; gap: 12px;
  width: 100%; text-align: left; padding: 13px 15px; border-radius: var(--r-md);
  border: 1.5px solid var(--line); background: var(--card); transition: 0.12s; position: relative;
}
.vote-opt:hover { border-color: var(--accent-line); background: var(--accent-tint); }
.vote-opt .radio { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--line); flex: none; display: grid; place-items: center; transition: 0.12s; }
.vote-opt .v-name { font-weight: 580; font-size: 14.5px; }
.vote-opt .v-desc { font-size: 12.5px; color: var(--ink-3); }
.vote-opt.sel { border-color: var(--accent); background: var(--accent-tint); }
.vote-opt.sel .radio { border-color: var(--accent); }
.vote-opt.sel .radio::after { content:""; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
.vote-opt .v-icon { margin-left: auto; color: var(--ink-3); }

.vote-cta { padding: 14px 20px 14px; }
.my-vote { margin: 4px 20px 14px; padding: 12px 14px; border-radius: var(--r-md); background: var(--accent-tint); border: 1px solid var(--accent-line); display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--accent-ink); }
.my-vote b { color: var(--ink); }

.sealed { margin: 14px 20px 18px; padding: 14px 16px; border-radius: var(--r-md); background: var(--bg-sunk); border: 1px dashed var(--line); display: flex; gap: 12px; align-items: flex-start; }
.sealed .s-ico { width: 34px; height: 34px; border-radius: 9px; background: var(--card); border: 1px solid var(--line); display: grid; place-items: center; color: var(--ink-2); flex: none; }
.sealed .s-title { font-size: 13.5px; font-weight: 600; }
.sealed .s-body { font-size: 12.5px; color: var(--ink-3); margin-top: 2px; line-height: 1.45; }
.sealed .s-count { color: var(--accent-ink); font-weight: 560; }

.modal-veil { position: fixed; inset: 0; background: oklch(0.22 0.03 260 / 0.5); display: grid; place-items: center; z-index: 200; padding: 20px; animation: veilIn 0.15s ease-out; }
.modal-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--r-card); box-shadow: 0 24px 64px oklch(0.2 0.03 260 / 0.28); padding: 22px; max-width: 460px; width: 100%; animation: cardIn 0.16s cubic-bezier(.2,.9,.3,1.2); }
@keyframes veilIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes cardIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: none; } }
.modal-title { font-size: 16px; font-weight: 640; margin: 0 0 6px; color: var(--ink); }
.modal-sub { font-size: 12.5px; color: var(--ink-3); margin: 0 0 16px; line-height: 1.5; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 4px; }
.dlg-spinner { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; border: 2px solid var(--accent-line); border-top-color: var(--accent); animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.challenge-log { scrollbar-width: none; -ms-overflow-style: none; }
.challenge-log::-webkit-scrollbar { display: none; }

.privacy { margin: 0 20px 18px; padding: 13px 15px; border-radius: var(--r-md); background: var(--accent-tint); border: 1px solid var(--accent-line); display: flex; gap: 11px; align-items: flex-start; }
.privacy .p-ico { color: var(--accent); flex: none; margin-top: 1px; }
.privacy .p-text { font-size: 12.5px; color: var(--accent-ink); line-height: 1.5; }
.privacy .p-text b { color: oklch(0.4 0.14 255); }

/* ============ results (ended) ============ */
.result-list { display: flex; flex-direction: column; gap: 14px; padding: 18px 20px; }
.result-row .r-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 7px; }
.result-row .r-name { font-weight: 580; font-size: 14px; display: flex; align-items: center; gap: 8px; }
.result-row .r-name .swatch { width: 9px; height: 9px; border-radius: 3px; }
.result-row .r-pct { font-weight: 660; font-size: 14px; }
.result-row .r-vp { font-size: 12px; color: var(--ink-3); margin-left: 7px; font-weight: 480; }
.result-bar { height: 10px; border-radius: 999px; background: var(--bg-sunk); overflow: hidden; }
.result-fill { height: 100%; border-radius: 999px; transition: width 0.8s cubic-bezier(.2,.7,.2,1); }
.result-row.win .r-name::after { content: "Winner"; font-size: 10px; font-weight: 600; color: var(--for); background: var(--for-tint); padding: 2px 7px; border-radius: 999px; letter-spacing: 0.02em; }

/* execution tracker */
.exec { padding: 16px 20px 20px; }
.exec-steps { display: flex; flex-direction: column; gap: 0; margin-top: 6px; }
.exec-step { display: flex; gap: 12px; position: relative; padding-bottom: 16px; }
.exec-step:last-child { padding-bottom: 0; }
.exec-step .e-node { width: 18px; height: 18px; border-radius: 50%; flex: none; display: grid; place-items: center; z-index: 1; background: var(--card); border: 2px solid var(--line); margin-top: 1px; }
.exec-step::before { content:""; position: absolute; left: 8px; top: 18px; bottom: -2px; width: 2px; background: var(--line); }
.exec-step:last-child::before { display: none; }
.exec-step.done .e-node { background: var(--for); border-color: var(--for); color: #fff; }
